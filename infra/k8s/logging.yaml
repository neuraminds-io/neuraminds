# Polyguard Centralized Logging Stack
#
# Components:
# - Loki: Log aggregation and storage
# - Promtail: Log collection agent (DaemonSet)
#
# Deploy with: kubectl apply -f logging.yaml
# Requires: Existing Grafana instance for visualization

---
# Loki Namespace (shared with monitoring)
apiVersion: v1
kind: Namespace
metadata:
  name: polyguard
  labels:
    app.kubernetes.io/part-of: polyguard

---
# Loki Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: polyguard
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      filesystem:
        directory: /loki/chunks
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache

    limits_config:
      retention_period: 720h  # 30 days
      max_query_series: 5000
      max_entries_limit_per_query: 10000
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      per_stream_rate_limit: 5MB

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: filesystem

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    analytics:
      reporting_enabled: false

---
# Loki StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: polyguard
  labels:
    app: loki
spec:
  replicas: 1
  serviceName: loki
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
              name: http
            - containerPort: 9096
              name: grpc
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: loki-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi

---
# Loki Service
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: polyguard
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: http
      name: http
  selector:
    app: loki

---
# Promtail Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: polyguard
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: warn

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.polyguard.svc.cluster.local:3100/loki/api/v1/push
        tenant_id: polyguard
        batchwait: 1s
        batchsize: 1048576  # 1MB
        timeout: 10s

    scrape_configs:
      # Polyguard API pods
      - job_name: polyguard-api
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["polyguard"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: polyguard-api
            action: keep
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_version]
            target_label: version
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
        pipeline_stages:
          # Parse structured JSON logs
          - json:
              expressions:
                level: level
                message: msg
                target: target
                timestamp: ts
                request_id: request_id
                wallet: wallet
                market_id: market_id
                order_id: order_id
                latency_ms: latency_ms
                status_code: status_code
                method: method
                path: path
          - labels:
              level:
              target:
              method:
              status_code:
          - timestamp:
              source: timestamp
              format: RFC3339Nano
          # Drop debug logs in production
          - match:
              selector: '{level="DEBUG"}'
              action: drop

      # Kubernetes system logs (polyguard namespace only)
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["polyguard"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: polyguard-api
            action: drop  # Already handled above
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

---
# Promtail DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: polyguard
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: promtail
          image: grafana/promtail:2.9.4
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 9080
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: positions
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: positions
          emptyDir: {}

---
# Promtail ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: polyguard

---
# Promtail ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]

---
# Promtail ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: polyguard
roleRef:
  kind: ClusterRole
  name: promtail
  apiGroup: rbac.authorization.k8s.io

---
# Grafana Loki Datasource (apply to existing Grafana)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-loki-datasource
  namespace: polyguard
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.polyguard.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000
          derivedFields:
            - datasourceUid: prometheus
              matcherRegex: "request_id=([a-f0-9-]+)"
              name: Request ID
              url: ""
        version: 1
        editable: false

---
# Grafana Dashboard ConfigMap (Log Explorer)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-log-dashboard
  namespace: polyguard
  labels:
    grafana_dashboard: "1"
data:
  polyguard-logs.json: |
    {
      "annotations": {"list": []},
      "description": "Polyguard API Logs",
      "editable": true,
      "panels": [
        {
          "title": "Log Volume",
          "type": "timeseries",
          "datasource": "Loki",
          "targets": [
            {
              "expr": "sum(count_over_time({app=\"polyguard-api\"} [1m])) by (level)",
              "legendFormat": "{{level}}"
            }
          ],
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 0}
        },
        {
          "title": "Error Logs",
          "type": "logs",
          "datasource": "Loki",
          "targets": [
            {
              "expr": "{app=\"polyguard-api\", level=~\"ERROR|WARN\"}"
            }
          ],
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 6}
        },
        {
          "title": "All Logs",
          "type": "logs",
          "datasource": "Loki",
          "targets": [
            {
              "expr": "{app=\"polyguard-api\"}"
            }
          ],
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 16}
        }
      ],
      "schemaVersion": 39,
      "title": "Polyguard Logs",
      "uid": "polyguard-logs"
    }
