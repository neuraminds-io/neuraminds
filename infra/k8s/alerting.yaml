# Polyguard Prometheus Alerting Rules
#
# Deploy with: kubectl apply -f alerting.yaml
# Requires Prometheus Operator

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: polyguard-alerts
  namespace: polyguard
  labels:
    release: prometheus
spec:
  groups:
    # API Health Alerts
    - name: polyguard.api
      rules:
        # High Error Rate
        - alert: PolyguardHighErrorRate
          expr: |
            sum(rate(http_requests_total{job="polyguard-api", status=~"5.."}[5m]))
            / sum(rate(http_requests_total{job="polyguard-api"}[5m]))
            > 0.05
          for: 2m
          labels:
            severity: critical
            service: polyguard-api
          annotations:
            summary: "High API error rate"
            description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

        # High Latency
        - alert: PolyguardHighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{job="polyguard-api"}[5m])) by (le)
            ) > 0.5
          for: 5m
          labels:
            severity: warning
            service: polyguard-api
          annotations:
            summary: "High API latency"
            description: "95th percentile latency is {{ $value | humanizeDuration }}"

        # P99 Latency Critical
        - alert: PolyguardCriticalLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{job="polyguard-api"}[5m])) by (le)
            ) > 2
          for: 2m
          labels:
            severity: critical
            service: polyguard-api
          annotations:
            summary: "Critical API latency"
            description: "99th percentile latency is {{ $value | humanizeDuration }}"

        # Pod Not Ready
        - alert: PolyguardPodNotReady
          expr: |
            kube_pod_status_ready{namespace="polyguard", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
            service: polyguard-api
          annotations:
            summary: "Pod not ready"
            description: "Pod {{ $labels.pod }} is not ready"

        # All Pods Down
        - alert: PolyguardAllPodsDown
          expr: |
            sum(kube_pod_status_ready{namespace="polyguard", condition="true"}) == 0
          for: 1m
          labels:
            severity: critical
            service: polyguard-api
          annotations:
            summary: "All API pods are down"
            description: "No healthy pods available"

    # Database Alerts
    - name: polyguard.database
      rules:
        # Database Connection Pool Exhaustion
        - alert: PolyguardDBPoolExhausted
          expr: |
            polyguard_db_pool_available{job="polyguard-api"} < 2
          for: 2m
          labels:
            severity: critical
            service: polyguard-database
          annotations:
            summary: "Database connection pool nearly exhausted"
            description: "Only {{ $value }} connections available"

        # Database Latency
        - alert: PolyguardDBHighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(polyguard_db_query_duration_seconds_bucket[5m])) by (le)
            ) > 0.1
          for: 5m
          labels:
            severity: warning
            service: polyguard-database
          annotations:
            summary: "High database query latency"
            description: "95th percentile query time is {{ $value | humanizeDuration }}"

        # Database Down
        - alert: PolyguardDBDown
          expr: |
            polyguard_health_database{job="polyguard-api"} != 1
          for: 1m
          labels:
            severity: critical
            service: polyguard-database
          annotations:
            summary: "Database health check failing"
            description: "Database is unhealthy or unreachable"

    # Redis Alerts
    - name: polyguard.redis
      rules:
        - alert: PolyguardRedisDown
          expr: |
            polyguard_health_redis{job="polyguard-api"} != 1
          for: 1m
          labels:
            severity: warning
            service: polyguard-redis
          annotations:
            summary: "Redis health check failing"
            description: "Redis is unhealthy or unreachable"

        - alert: PolyguardRedisHighMemory
          expr: |
            redis_memory_used_bytes / redis_memory_max_bytes > 0.9
          for: 5m
          labels:
            severity: warning
            service: polyguard-redis
          annotations:
            summary: "Redis memory usage high"
            description: "Redis memory usage is {{ $value | humanizePercentage }}"

    # Business Metrics Alerts
    - name: polyguard.business
      rules:
        # Order Settlement Failures
        - alert: PolyguardSettlementFailures
          expr: |
            rate(polyguard_settlement_failures_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
            service: polyguard-settlement
          annotations:
            summary: "High settlement failure rate"
            description: "Settlement failures: {{ $value }} per second"

        # Order Queue Buildup
        - alert: PolyguardOrderQueueHigh
          expr: |
            polyguard_pending_settlements > 100
          for: 10m
          labels:
            severity: warning
            service: polyguard-settlement
          annotations:
            summary: "Order settlement queue building up"
            description: "{{ $value }} orders pending settlement"

        # Rate Limiting Excessive
        - alert: PolyguardExcessiveRateLimiting
          expr: |
            sum(rate(polyguard_rate_limited_requests_total[5m])) > 10
          for: 5m
          labels:
            severity: warning
            service: polyguard-api
          annotations:
            summary: "Excessive rate limiting"
            description: "{{ $value }} requests/sec being rate limited"

    # Resource Alerts
    - name: polyguard.resources
      rules:
        # High CPU
        - alert: PolyguardHighCPU
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="polyguard"}[5m])
            / on(pod) kube_pod_container_resource_limits{resource="cpu"} > 0.9
          for: 5m
          labels:
            severity: warning
            service: polyguard
          annotations:
            summary: "High CPU usage"
            description: "Pod {{ $labels.pod }} CPU at {{ $value | humanizePercentage }}"

        # High Memory
        - alert: PolyguardHighMemory
          expr: |
            container_memory_usage_bytes{namespace="polyguard"}
            / on(pod) kube_pod_container_resource_limits{resource="memory"} > 0.9
          for: 5m
          labels:
            severity: warning
            service: polyguard
          annotations:
            summary: "High memory usage"
            description: "Pod {{ $labels.pod }} memory at {{ $value | humanizePercentage }}"

        # OOM Killed
        - alert: PolyguardOOMKilled
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="polyguard", reason="OOMKilled"}[1h]) > 0
          labels:
            severity: critical
            service: polyguard
          annotations:
            summary: "Pod killed due to OOM"
            description: "Pod {{ $labels.pod }} was OOM killed"

---
# AlertManager Configuration
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-polyguard
  namespace: polyguard
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

    route:
      group_by: ['alertname', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-default'
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
          continue: true
        - match:
            severity: warning
          receiver: 'slack-warning'

    receivers:
      - name: 'slack-default'
        slack_configs:
          - channel: '#polyguard-alerts'
            send_resolved: true
            title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

      - name: 'slack-warning'
        slack_configs:
          - channel: '#polyguard-alerts'
            send_resolved: true
            color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
            title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
            description: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}'
            details:
              severity: '{{ .CommonLabels.severity }}'
              service: '{{ .CommonLabels.service }}'
              description: '{{ .CommonAnnotations.description }}'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'service']
