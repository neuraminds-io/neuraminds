# Polyguard Secrets Configuration
#
# In production, use a secrets manager like:
# - AWS Secrets Manager with External Secrets Operator
# - HashiCorp Vault
# - Sealed Secrets
#
# This file is a template - DO NOT commit actual secrets

---
# External Secrets Operator configuration (recommended)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: polyguard-secrets
  namespace: polyguard
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: polyguard-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: polyguard/production
        property: database_url
    - secretKey: redis-url
      remoteRef:
        key: polyguard/production
        property: redis_url
    - secretKey: jwt-secret
      remoteRef:
        key: polyguard/production
        property: jwt_secret
    - secretKey: keeper-keypair
      remoteRef:
        key: polyguard/production
        property: keeper_keypair

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: polyguard-config
  namespace: polyguard
data:
  solana-rpc-url: "https://api.mainnet-beta.solana.com"
  # Override for devnet: "https://api.devnet.solana.com"

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: polyguard-api
  namespace: polyguard
  annotations:
    # For AWS IAM roles for service accounts
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/polyguard-api

---
