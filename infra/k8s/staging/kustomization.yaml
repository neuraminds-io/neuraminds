# Staging environment overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: polyguard-staging

resources:
  - ../base

configMapGenerator:
  - name: polyguard-config
    behavior: merge
    literals:
      - base-rpc-url=https://sepolia.base.org
      - base-chain-id=84532
      - environment=staging
      - log-level=debug

replicas:
  - name: polyguard-api-blue
    count: 2

images:
  - name: polyguard/api
    newName: ghcr.io/polyguard/polyguard/backend
    newTag: latest

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
    target:
      kind: Deployment
      name: polyguard-api-blue

  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api-staging.polyguard.cc
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api-staging.polyguard.cc
      - op: replace
        path: /spec/tls/0/secretName
        value: polyguard-api-staging-tls
    target:
      kind: Ingress
      name: polyguard-api

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5
    target:
      kind: HorizontalPodAutoscaler
      name: polyguard-api-blue
