name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback"
        required: true
        type: choice
        options:
          - "staging"
          - "production"
      rollback_type:
        description: "Rollback type"
        required: true
        type: choice
        options:
          - "previous"
          - "specific-revision"
          - "specific-image"
        default: "previous"
      revision:
        description: "Revision number (for specific-revision)"
        required: false
        type: string
      image_tag:
        description: "Image tag (for specific-image)"
        required: false
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  KUBE_NAMESPACE_PREFIX: ${{ vars.KUBE_NAMESPACE_PREFIX }}
  KUBE_DEPLOYMENT_NAME: ${{ vars.KUBE_DEPLOYMENT_NAME }}
  PROD_HEALTHCHECK_URL: ${{ vars.PROD_HEALTHCHECK_URL }}
  STAGING_HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL }}

jobs:
  rollback:
    name: Rollback ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}-rollback
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          else
            echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Get current state
        id: current
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-neuraminds}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-neuraminds-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"

          current_image="$(kubectl get deployment "$deployment_name" -n "$namespace" \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          current_revision="$(kubectl rollout history "deployment/${deployment_name}" \
            -n "$namespace" | tail -1 | awk '{print $1}')"
          replicas="$(kubectl get deployment "$deployment_name" -n "$namespace" \
            -o jsonpath='{.status.readyReplicas}')"

          echo "current_image=$current_image" >> "$GITHUB_OUTPUT"
          echo "current_revision=$current_revision" >> "$GITHUB_OUTPUT"
          echo "current_replicas=$replicas" >> "$GITHUB_OUTPUT"

          echo "Current state:"
          echo "  Namespace: $namespace"
          echo "  Deployment: $deployment_name"
          echo "  Image: $current_image"
          echo "  Revision: $current_revision"
          echo "  Ready replicas: $replicas"

      - name: Show rollout history
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-neuraminds}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-neuraminds-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"
          kubectl rollout history "deployment/${deployment_name}" -n "$namespace"

      - name: Rollback to previous
        if: github.event.inputs.rollback_type == 'previous'
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-neuraminds}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-neuraminds-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"

          kubectl rollout undo "deployment/${deployment_name}" -n "$namespace"
          kubectl rollout status "deployment/${deployment_name}" -n "$namespace" --timeout=300s

      - name: Rollback to specific revision
        if: github.event.inputs.rollback_type == 'specific-revision'
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-neuraminds}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-neuraminds-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"
          revision="${{ github.event.inputs.revision }}"

          if [[ -z "$revision" ]]; then
            echo "::error::Revision number is required for specific-revision rollback"
            exit 1
          fi

          kubectl rollout undo "deployment/${deployment_name}" -n "$namespace" --to-revision="$revision"
          kubectl rollout status "deployment/${deployment_name}" -n "$namespace" --timeout=300s

      - name: Rollback to specific image
        if: github.event.inputs.rollback_type == 'specific-image'
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-neuraminds}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-neuraminds-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"
          image_tag="${{ github.event.inputs.image_tag }}"

          if [[ -z "$image_tag" ]]; then
            echo "::error::Image tag is required for specific-image rollback"
            exit 1
          fi

          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$image_tag"
          kubectl set image "deployment/${deployment_name}" api="$image" -n "$namespace"
          kubectl rollout status "deployment/${deployment_name}" -n "$namespace" --timeout=300s

      - name: Verify rollback
        id: verify
        run: |
          namespace_prefix="${KUBE_NAMESPACE_PREFIX:-neuraminds}"
          deployment_name="${KUBE_DEPLOYMENT_NAME:-neuraminds-api}"
          namespace="${namespace_prefix}-${{ github.event.inputs.environment }}"

          new_image="$(kubectl get deployment "$deployment_name" -n "$namespace" \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"
          ready="$(kubectl get deployment "$deployment_name" -n "$namespace" \
            -o jsonpath='{.status.readyReplicas}')"

          echo "new_image=$new_image" >> "$GITHUB_OUTPUT"
          echo "Rollback verification:"
          echo "  Previous image: ${{ steps.current.outputs.current_image }}"
          echo "  New image: $new_image"
          echo "  Ready replicas: $ready"

      - name: Health check
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            health_url="${PROD_HEALTHCHECK_URL:-https://api.neuraminds.io/health}"
          else
            health_url="${STAGING_HEALTHCHECK_URL:-https://api-staging.neuraminds.io/health}"
          fi

          sleep 15
          for i in {1..5}; do
            if curl -sf "$health_url" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done

          echo "::error::Health check failed after rollback"
          exit 1

      - name: Create rollback record
        run: |
          echo "## Rollback Record" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rollback type | ${{ github.event.inputs.rollback_type }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Previous image | ${{ steps.current.outputs.current_image }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| New image | ${{ steps.verify.outputs.new_image }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | ${{ github.event.inputs.reason }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |" >> "$GITHUB_STEP_SUMMARY"
