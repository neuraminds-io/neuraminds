name: Synthetic Monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: synthetic-monitoring-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  probe:
    name: Probe (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [production, staging]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Resolve targets
        id: targets
        env:
          SYNTHETIC_PROD_API_URL: ${{ vars.SYNTHETIC_PROD_API_URL }}
          SYNTHETIC_PROD_WEB_URL: ${{ vars.SYNTHETIC_PROD_WEB_URL }}
          SYNTHETIC_STAGING_API_URL: ${{ vars.SYNTHETIC_STAGING_API_URL }}
          SYNTHETIC_STAGING_WEB_URL: ${{ vars.SYNTHETIC_STAGING_WEB_URL }}
        run: |
          set -eu
          if [ "${{ matrix.environment }}" = "production" ]; then
            api_url="${SYNTHETIC_PROD_API_URL}"
            web_url="${SYNTHETIC_PROD_WEB_URL}"
          else
            api_url="${SYNTHETIC_STAGING_API_URL}"
            web_url="${SYNTHETIC_STAGING_WEB_URL}"
          fi

          if [ -z "${api_url}" ] || [ -z "${web_url}" ]; then
            echo "::warning::Skipping synthetic monitoring for ${{ matrix.environment }} (missing URL variables)"
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "enabled=true" >> "${GITHUB_OUTPUT}"
          echo "api_url=${api_url}" >> "${GITHUB_OUTPUT}"
          echo "web_url=${web_url}" >> "${GITHUB_OUTPUT}"

      - name: Run synthetic probe
        if: steps.targets.outputs.enabled == 'true'
        run: |
          node scripts/synthetic-monitor.mjs \
            --env "${{ matrix.environment }}" \
            --api-url "${{ steps.targets.outputs.api_url }}" \
            --web-url "${{ steps.targets.outputs.web_url }}" \
            --chain-mode base

      - name: Upload synthetic report
        if: steps.targets.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-monitor-${{ matrix.environment }}
          path: |
            docs/reports/synthetic-monitor-${{ matrix.environment }}.json
            docs/reports/synthetic-monitor-${{ matrix.environment }}.md
          if-no-files-found: error
