name: Launch Readiness

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "web/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/launch-readiness.yml"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: read

concurrency:
  group: launch-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    name: Readiness Gates
    runs-on: ubuntu-latest
    env:
      CHAIN_MODE: base
      DATABASE_URL: postgres://neuraminds:neuraminds@localhost:5432/neuraminds_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: launch-readiness-static-secret-32-bytes-minimum
      BLINDFOLD_WEBHOOK_SECRET: launch-readiness-blindfold-secret
      EVM_ENABLED: "true"
      EVM_READS_ENABLED: "true"
      EVM_WRITES_ENABLED: "true"
      BASE_AGENT_RUNTIME_OPERATOR_PRIVATE_KEY: 0xdeadbeef
      NEXT_PUBLIC_API_URL: https://api.neuraminds.ai/v1
      NEXT_PUBLIC_CHAIN_MODE: base
      AUTH_ALLOWED_ORIGINS: https://app.neuraminds.ai
      CORS_ORIGINS: https://app.neuraminds.ai
      BASE_RPC_URL: https://mainnet.base.org
      BASE_WS_URL: wss://mainnet.base.org
      BASE_CHAIN_ID: "8453"
      SIWE_DOMAIN: app.neuraminds.ai
      MARKET_CORE_ADDRESS: "0x4d66ab11e147f6d8c395b36d6b0da867eb1f7a13"
      ORDER_BOOK_ADDRESS: "0x391050b6a7e3be5b699772880fe6d3d249d49b7b"
      COLLATERAL_VAULT_ADDRESS: "0x139290d00aebe1df9f5d40b796c0d30dea1e93a0"
      AGENT_RUNTIME_ADDRESS: "0xbf5d884648bd799092f5b1663c950a85dee1e825"
      ERC8004_IDENTITY_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000001"
      ERC8004_REPUTATION_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000002"
      X402_ENABLED: "true"
      X402_SIGNING_KEY: launch-readiness-x402-signing-key
      X402_RECEIVER_ADDRESS: "0x0000000000000000000000000000000000000003"
      XMTP_SWARM_ENABLED: "true"
      XMTP_SWARM_SIGNING_KEY: launch-readiness-xmtp-signing-key
      XMTP_SWARM_TRANSPORT: xmtp_http
      XMTP_SWARM_BRIDGE_URL: https://bridge.neuraminds.ai
      NEXT_PUBLIC_BASE_RPC_URL: https://mainnet.base.org
      NEXT_PUBLIC_BASE_CHAIN_ID: "8453"
      NEXT_PUBLIC_SIWE_DOMAIN: app.neuraminds.ai
      NEXT_PUBLIC_MARKET_CORE_ADDRESS: "0x4d66ab11e147f6d8c395b36d6b0da867eb1f7a13"
      NEXT_PUBLIC_ORDER_BOOK_ADDRESS: "0x391050b6a7e3be5b699772880fe6d3d249d49b7b"
      NEXT_PUBLIC_AGENT_RUNTIME_ADDRESS: "0xbf5d884648bd799092f5b1663c950a85dee1e825"
      NEXT_PUBLIC_COLLATERAL_TOKEN_ADDRESS: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
      NEXT_PUBLIC_COLLATERAL_VAULT_ADDRESS: "0x139290d00aebe1df9f5d40b796c0d30dea1e93a0"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Validate launch config
        run: npm run launch:config:prod-strict

      - name: Run strict production gates
        env:
          PRODUCTION_GATE_TIMEOUT_MS: "900000"
        run: npm run production:gates:strict

      - name: Generate launch summary
        run: npm run launch:summary

      - name: Upload readiness reports
        uses: actions/upload-artifact@v4
        with:
          name: launch-readiness-reports
          path: |
            docs/reports/*.json
            docs/reports/*.md
          if-no-files-found: warn
