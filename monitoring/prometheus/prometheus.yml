global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'polyguard'

rule_files:
  - 'alerts.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'polyguard-api'
    metrics_path: '/metrics/prometheus'
    static_configs:
      - targets: ['api:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'polyguard-api'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
