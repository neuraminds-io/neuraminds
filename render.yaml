services:
  - type: web
    name: neuraminds-api
    runtime: docker
    dockerfilePath: ./app/Dockerfile
    dockerContext: .
    region: singapore
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neuraminds-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: neuraminds-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: RUST_LOG
        value: info
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: EVM_ENABLED
        value: "true"
      - key: EVM_READS_ENABLED
        value: "true"
      - key: EVM_WRITES_ENABLED
        value: "true"
      - key: BASE_RPC_URL
        value: https://mainnet.base.org
      - key: BASE_CHAIN_ID
        value: "8453"
      - key: CORS_ORIGINS
        value: https://neuraminds.io,https://app.neuraminds.io


databases:
  - name: neuraminds-db
    plan: starter
    region: singapore
    postgresMajorVersion: "16"

# Note: Redis requires paid plan on Render
# For free tier, use external Redis (e.g., Upstash)
